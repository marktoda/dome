id: dome.daily
version: 0.4.0
processors:
  - id: dome.daily.normalize-task-syntax
    version: 0.2.0
    phase: garden
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.created
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.created
        pathPattern: "notes/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/**/*.md", "notes/*.md"]
    module: processors/normalize-task-syntax.ts

  - id: dome.daily.stamp-block-id
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.created
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.created
        pathPattern: "notes/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/**/*.md", "notes/*.md"]
    module: processors/stamp-block-id.ts

  - id: dome.daily.create-daily
    version: 0.1.6
    phase: garden
    triggers:
      - kind: schedule
        cron: "0 6 * * *"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/dailies/*.md", "notes/*.md"]
    module: processors/create-daily.ts

  - id: dome.daily.task-index
    version: 0.1.6
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.created
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.created
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "notes/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: graph.write
        namespaces: ["dome.daily.*"]
      - kind: question.ask
    module: processors/task-index.ts

  - id: dome.daily.ambiguous-followup-answer
    version: 0.1.1
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.daily.task-index
        idempotencyKeyPrefix: "dome.daily.ambiguous-followup:"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/**/*.md", "notes/*.md"]
    module: processors/ambiguous-followup-answer.ts

  - id: dome.daily.today
    version: 0.1.12
    phase: view
    triggers:
      - kind: command
        name: today
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
    module: processors/today.ts

  - id: dome.daily.prep
    version: 0.1.14
    phase: view
    triggers:
      - kind: command
        name: prep
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
    module: processors/prep.ts

  - id: dome.daily.agenda-with
    version: 0.1.9
    phase: view
    triggers:
      - kind: command
        name: agenda-with
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
    module: processors/agenda-with.ts

  - id: dome.daily.carry-forward
    version: 0.2.11
    phase: garden
    triggers:
      - kind: schedule
        cron: "0 6 * * *"
      - kind: signal
        name: file.created
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.created
        pathPattern: "notes/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "notes/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/dailies/*.md", "notes/*.md"]
    module: processors/carry-forward.ts

  # The evening close (daily-surface D4). Schedule-only BY DESIGN — no file
  # trigger: the close is a ritual moment, not a live surface; it snapshots
  # the day once, and a commit-triggered rewrite would fight the human's
  # keep/delete edits inside the presence-gated dome.daily:close block.
  - id: dome.daily.close-scaffold
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "30 21 * * *"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/dailies/*.md", "notes/*.md"]
    module: processors/close-scaffold.ts

  - id: dome.daily.compose-blocks
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "25 5 * * *"
      - kind: signal
        name: questions.changed
      - kind: signal
        name: file.created
        pathPattern: "sources/calendar/*.md"
      - kind: signal
        name: file.created
        pathPattern: "sources/slack/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "sources/calendar/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "sources/slack/*.md"
      - kind: signal
        name: file.created
        pathPattern: "meta/sweep-ledger.md"
      - kind: signal
        name: document.changed
        pathPattern: "meta/sweep-ledger.md"
    capabilities:
      - kind: read
        paths:
          - "wiki/dailies/*.md"
          - "sources/calendar/*.md"
          - "sources/slack/*.md"
          - "meta/sweep-ledger.md"
      - kind: patch.auto
        paths: ["wiki/dailies/*.md"]
      - kind: questions.read
    execution:
      class: deterministic
    module: processors/compose-blocks.ts

  - id: dome.daily.reconcile-tasks
    version: 0.1.1
    phase: garden
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.created
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.created
        pathPattern: "notes/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/**/*.md", "notes/*.md"]
    inspection:
      kind: all-readable-markdown
    module: processors/reconcile-tasks.ts

  # Clock-aware warden: emits one settle-stale QuestionEffect per stale/overdue
  # open-loop task. Stale = overdue ≥ 14 days, PERIOD (undated tasks are never
  # settle-question candidates). Cron-only BY DESIGN: staleness is a daily
  # property, not a per-commit fact; schedule matches create-daily so the
  # owner sees fresh signals each morning. NOT registered as
  # execution.class: deterministic because the output depends on ctx.now()
  # for the overdue date comparison.
  - id: dome.daily.stale-task-warden
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "0 6 * * *"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: question.ask
    module: processors/stale-task-warden.ts

  # Deterministic answer handler for dome.daily.stale-task-warden questions.
  # Applies the owner's disposition (close / defer / keep) to the stale task
  # identified by its ^anchor (metadata.material) in the source file
  # (metadata.destination). close → `- [-]` (idempotent); defer → advances the
  # 📅 date by DEFER_DAYS from today; keep → no effects.
  # No model, no graph.write — patch.auto only.
  - id: dome.daily.settle-stale-answer
    version: 0.1.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.daily.stale-task-warden
        idempotencyKeyPrefix: "dome.daily.settle-stale:"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/**/*.md", "notes/*.md"]
    module: processors/settle-stale-answer.ts

# Doctor contributions (wiki/specs/cli.md §"dome doctor"): grant-entry probes
# evaluated generically by the health report. dome init --refresh-config never
# merges new entries into existing grant keys, so these name the exact YAML a
# pre-rollout vault must add.
doctor:
  grantEntries:
    - processorId: dome.daily.compose-blocks
      entries:
        - kind: read
          target: sources/calendar/*.md
        - kind: read
          target: sources/slack/*.md
        - kind: read
          target: meta/sweep-ledger.md
      why: >-
        the agenda and integrated-overnight blocks silently never render —
        calendar/slack/ledger reads return null outside the grant
      recovery: >-
        Add "sources/calendar/*.md", "sources/slack/*.md", and
        "meta/sweep-ledger.md" to extensions.dome.daily.grant.read in
        .dome/config.yaml.
