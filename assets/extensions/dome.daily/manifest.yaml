id: dome.daily
version: 0.4.0
processors:
  - id: dome.daily.normalize-task-syntax
    version: 0.2.0
    phase: garden
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.created
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.created
        pathPattern: "notes/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/**/*.md", "notes/*.md"]
    module: processors/normalize-task-syntax.ts

  - id: dome.daily.stamp-block-id
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.created
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.created
        pathPattern: "notes/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/**/*.md", "notes/*.md"]
    module: processors/stamp-block-id.ts

  - id: dome.daily.create-daily
    version: 0.1.6
    phase: garden
    triggers:
      - kind: schedule
        cron: "0 6 * * *"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/dailies/*.md", "notes/*.md"]
    module: processors/create-daily.ts

  - id: dome.daily.task-index
    version: 0.1.6
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.created
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.created
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "notes/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: graph.write
        namespaces: ["dome.daily.*"]
      - kind: question.ask
    module: processors/task-index.ts

  - id: dome.daily.ambiguous-followup-answer
    version: 0.1.1
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.daily.task-index
        idempotencyKeyPrefix: "dome.daily.ambiguous-followup:"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/**/*.md", "notes/*.md"]
    module: processors/ambiguous-followup-answer.ts

  - id: dome.daily.today
    version: 0.1.12
    phase: view
    triggers:
      - kind: command
        name: today
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: questions.read
      - kind: proposals.read
    module: processors/today.ts

  - id: dome.daily.prep
    version: 0.1.14
    phase: view
    triggers:
      - kind: command
        name: prep
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
    module: processors/prep.ts

  - id: dome.daily.agenda-with
    version: 0.1.9
    phase: view
    triggers:
      - kind: command
        name: agenda-with
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
    module: processors/agenda-with.ts

  - id: dome.daily.carry-forward
    version: 0.2.11
    phase: garden
    triggers:
      - kind: schedule
        cron: "0 6 * * *"
      - kind: signal
        name: file.created
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.created
        pathPattern: "notes/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "notes/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/dailies/*.md", "notes/*.md"]
    module: processors/carry-forward.ts

  # The evening close (daily-surface D4). Schedule-only BY DESIGN — no file
  # trigger: the close is a ritual moment, not a live surface; it snapshots
  # the day once, and a commit-triggered rewrite would fight the human's
  # keep/delete edits inside the presence-gated dome.daily:close block.
  - id: dome.daily.close-scaffold
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "30 21 * * *"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/dailies/*.md", "notes/*.md"]
    module: processors/close-scaffold.ts

  - id: dome.daily.compose-blocks
    version: 0.2.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "25 5 * * *"
      - kind: signal
        name: questions.changed
      - kind: signal
        name: proposals.changed
      - kind: signal
        name: file.created
        pathPattern: "sources/calendar/*.md"
      - kind: signal
        name: file.created
        pathPattern: "sources/slack/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "sources/calendar/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "sources/slack/*.md"
    capabilities:
      - kind: read
        paths:
          - "wiki/dailies/*.md"
          - "sources/calendar/*.md"
          - "sources/slack/*.md"
      - kind: patch.auto
        paths: ["wiki/dailies/*.md"]
      - kind: questions.read
      - kind: proposals.read
    execution:
      class: deterministic
    module: processors/compose-blocks.ts

  - id: dome.daily.reconcile-tasks
    version: 0.1.1
    phase: garden
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.created
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.created
        pathPattern: "notes/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/**/*.md", "notes/*.md"]
    inspection:
      kind: all-readable-markdown
    module: processors/reconcile-tasks.ts

# Doctor contributions (wiki/specs/cli.md §"dome doctor"): grant-entry probes
# evaluated generically by the health report. dome init --refresh-config never
# merges new entries into existing grant keys, so these name the exact YAML a
# pre-rollout vault must add.
doctor:
  grantEntries:
    - processorId: dome.daily.compose-blocks
      entries:
        - kind: read
          target: sources/calendar/*.md
        - kind: read
          target: sources/slack/*.md
      why: >-
        the agenda and source record silently never render because source
        reads return null outside the grant
      recovery: >-
        Add "sources/calendar/*.md" and "sources/slack/*.md" to
        extensions.dome.daily.grant.read in .dome/config.yaml.
