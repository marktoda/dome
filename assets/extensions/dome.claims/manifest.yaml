id: dome.claims
version: 0.1.1
processors:
  - id: dome.claims.stamp
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.created
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.created
        pathPattern: "notes/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: patch.auto
        paths: ["wiki/**/*.md", "notes/*.md"]
    module: processors/stamp-anchor.ts

  - id: dome.claims.index
    version: 0.1.0
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.created
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.created
        pathPattern: "notes/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "notes/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md", "notes/*.md"]
      - kind: graph.write
        namespaces: ["dome.claims.*"]
    # Whole-vault adoption scanner: emits a fact per claim line across every
    # readable wiki + notes page on each run. Under the 10s adoption default it
    # timed out on the 786-page live vault (surfaced by run.recurring-timeout,
    # whose recovery text says to raise the processor's execution.timeoutMs).
    # 30s headroom matches the sibling whole-vault scanners (Half A:
    # duplicate-detection/lint-supersession 30s, broken-images 20s) and stays
    # under the 60s adoption ceiling. Same band-aid class as Half A, with the
    # same deferred follow-up: an incremental scan keyed on changed paths.
    execution:
      class: deterministic
      timeoutMs: 30000
    module: processors/claim-index.ts
