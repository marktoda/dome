id: dome.health
version: 0.1.1
processors:
  - id: dome.health.outbox-recovery-questions
    version: 0.1.1
    phase: garden
    triggers:
      - kind: schedule
        cron: "* * * * *"
    capabilities:
      - kind: outbox.read
        statuses: ["failed"]
      - kind: question.ask
    module: processors/outbox-recovery-questions.ts

  - id: dome.health.outbox-recovery-answer
    version: 0.1.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.health.outbox-recovery-questions
        idempotencyKeyPrefix: "dome.health.outbox-recovery:"
    capabilities:
      - kind: outbox.recover
        actions: ["retry", "abandon"]
    module: processors/outbox-recovery-answer.ts

  - id: dome.health.quarantine-recovery-questions
    version: 0.1.1
    phase: garden
    triggers:
      - kind: schedule
        cron: "* * * * *"
    capabilities:
      - kind: quarantine.read
      - kind: question.ask
    module: processors/quarantine-recovery-questions.ts

  - id: dome.health.quarantine-recovery-answer
    version: 0.1.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.health.quarantine-recovery-questions
        idempotencyKeyPrefix: "dome.health.quarantine-recovery:"
    capabilities:
      - kind: quarantine.recover
        actions: ["reset"]
    module: processors/quarantine-recovery-answer.ts

  - id: dome.health.orphan-run-recovery-questions
    version: 0.1.1
    phase: garden
    triggers:
      - kind: schedule
        cron: "* * * * *"
    capabilities:
      - kind: run.read
        statuses: ["running"]
      - kind: question.ask
    module: processors/orphan-run-recovery-questions.ts

  - id: dome.health.orphan-run-recovery-answer
    version: 0.1.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.health.orphan-run-recovery-questions
        idempotencyKeyPrefix: "dome.health.orphan-run-recovery:"
    capabilities:
      - kind: run.recover
        actions: ["fail"]
    module: processors/orphan-run-recovery-answer.ts
