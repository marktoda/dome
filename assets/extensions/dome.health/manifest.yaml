id: dome.health
version: 0.2.0
processors:
  - id: dome.health.outbox-recovery-questions
    version: 0.1.2
    phase: garden
    triggers:
      - kind: signal
        name: outbox.changed
    capabilities:
      - kind: read
        paths: ["**"]
      - kind: outbox.read
        statuses: ["failed"]
      - kind: question.ask
    module: processors/outbox-recovery-questions.ts

  - id: dome.health.outbox-recovery-answer
    version: 0.1.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.health.outbox-recovery-questions
        idempotencyKeyPrefix: "dome.health.outbox-recovery:"
    capabilities:
      - kind: outbox.recover
        actions: ["retry", "abandon"]
    module: processors/outbox-recovery-answer.ts

  - id: dome.health.quarantine-recovery-questions
    version: 0.1.2
    phase: garden
    triggers:
      - kind: signal
        name: quarantine.changed
    capabilities:
      - kind: quarantine.read
      - kind: question.ask
    module: processors/quarantine-recovery-questions.ts

  - id: dome.health.quarantine-recovery-answer
    version: 0.1.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.health.quarantine-recovery-questions
        idempotencyKeyPrefix: "dome.health.quarantine-recovery:"
    capabilities:
      - kind: quarantine.recover
        actions: ["reset"]
    module: processors/quarantine-recovery-answer.ts

  - id: dome.health.orphan-run-recovery-questions
    version: 0.1.2
    phase: garden
    triggers:
      # Orphan runs are absence, not change — no store transition can fire a
      # signal on a row that stopped moving. Keeps a cron, demoted per-minute
      # → hourly (crash artifacts; an hour's detection latency is fine and the
      # recovery is human-gated). See 2026-07-02-pruning-pass-design §4.
      - kind: schedule
        cron: "0 * * * *"
    capabilities:
      - kind: run.read
        statuses: ["running"]
      - kind: question.ask
    module: processors/orphan-run-recovery-questions.ts

  - id: dome.health.orphan-run-recovery-answer
    version: 0.1.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.health.orphan-run-recovery-questions
        idempotencyKeyPrefix: "dome.health.orphan-run-recovery:"
    capabilities:
      - kind: run.recover
        actions: ["fail"]
    module: processors/orphan-run-recovery-answer.ts

  # The weekly garden report (product review's "prove" instrument). Monday
  # 05:22 — before the 05:30 brief, after the wake-tick sources/index/brief
  # order so the card reflects the settled week. Deterministic: reads the run
  # ledger (all statuses) + question rows over the trailing 7 days, emits ONE
  # PatchEffect rewriting meta/report-card.md AND splicing the
  # dome.health:report-card block into today's daily. No model, no facts, no
  # questions. run.read declares no statuses → all statuses (the card counts
  # succeeded/failed/quarantine-skipped alike). See
  # [[wiki/specs/daily-surface]] §"Report card".
  - id: dome.health.report-card
    version: 0.2.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "22 5 * * 1"
    capabilities:
      - kind: read
        paths:
          - "wiki/dailies/*.md"
          - "meta/report-card.md"
          - "meta/retrieval-misses.md"
          # The trust-ladder section resolves each proposal producer's
          # autonomy (auto vs propose) from the vault grant surface.
          - ".dome/config.yaml"
      - kind: patch.auto
        paths: ["meta/report-card.md", "wiki/dailies/*.md"]
      - kind: run.read
      - kind: questions.read
      # The trust-ladder section: per producing processor, decided/applied
      # counts + accept rate over the card's window.
      - kind: proposals.read
    execution:
      class: deterministic
    module: processors/report-card.ts

  # The trust ladder (product review 5): the gardener proposes changes to its
  # own autonomy through the proposal review loop. Monday 05:24 — after the
  # 05:22 report card (whose trust section shows the same evidence), before
  # the 05:30 brief. Deterministic: reads proposal rows (proposals.read) +
  # run rows (run.read, all statuses) + .dome/config.yaml, and emits at most
  # one propose-mode PatchEffect per promotion (a comment-preserving config
  # diff granting patch.auto for the paths the producer currently proposes)
  # plus owner-needed dormancy questions. patch.propose is scoped to
  # .dome/config.yaml ONLY, and the effect is mode:"propose" — the engine can
  # never auto-apply its own autonomy change. See [[wiki/specs/proposals]]
  # §"Trust ladder".
  - id: dome.health.trust-review
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "24 5 * * 1"
    capabilities:
      - kind: read
        paths: [".dome/config.yaml"]
      - kind: patch.propose
        paths: [".dome/config.yaml"]
      - kind: proposals.read
      - kind: run.read
    execution:
      class: deterministic
    module: processors/trust-review.ts

# Doctor contributions (wiki/specs/cli.md §"dome doctor"): grant-entry probes
# evaluated generically by the health report. dome init --refresh-config never
# merges new entries into existing grant keys, so these name the exact YAML a
# pre-rollout vault must add.
doctor:
  grantEntries:
    - processorId: dome.health.report-card
      entries:
        - kind: patch.auto
          target: meta/report-card.md
        - kind: patch.auto
          target: wiki/dailies/*.md
      why: >-
        the weekly report card silently never writes — the card file and the
        daily block are outside the grant, so both patch writes are dropped
      recovery: >-
        Add "meta/report-card.md" and "wiki/dailies/*.md" to the
        dome.health.report-card per-processor grant.patch.auto in
        .dome/config.yaml (the report-card processor uses a replacement grant,
        narrower than the dome.health bundle grant).
    - processorId: dome.health.report-card
      entries:
        - kind: read
          target: .dome/config.yaml
      why: >-
        the weekly card's trust-ladder section cannot resolve producer
        autonomy — every row renders "unknown"
      recovery: >-
        Add ".dome/config.yaml" to the dome.health.report-card per-processor
        grant.read in .dome/config.yaml.
    # trust-review's other capabilities (patch.propose, proposals.read,
    # run.read, question.ask) are kind-level and covered by the general
    # capability.grant-missing probe — ManifestGrantEntry's kind enum has no
    # slots for them (the dome.agent.consolidate patch.propose precedent).
    - processorId: dome.health.trust-review
      entries:
        - kind: read
          target: .dome/config.yaml
      why: >-
        trust-review cannot read the vault grant surface, so every producer's
        autonomy resolves "unknown" and promotions are silently never proposed
      recovery: >-
        Add ".dome/config.yaml" to the dome.health.trust-review per-processor
        grant.read in .dome/config.yaml.
