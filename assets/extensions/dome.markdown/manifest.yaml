id: dome.markdown
version: 0.3.0
processors:
  - id: dome.markdown.validate-wikilinks
    version: 0.1.0
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md"]
    module: processors/validate-wikilinks.ts

  - id: dome.markdown.normalize-frontmatter
    version: 0.1.0
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: patch.auto
        paths: ["**/*.md"]
    module: processors/normalize-frontmatter.ts

  - id: dome.markdown.lint-frontmatter
    version: 0.1.0
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md"]
    module: processors/lint-frontmatter.ts

  - id: dome.markdown.broken-images
    version: 0.1.0
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md", "**/*.{png,jpg,jpeg,gif,webp,svg,avif}"]
    module: processors/broken-images.ts

  - id: dome.markdown.duplicate-detection
    version: 0.1.0
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: question.ask
    module: processors/duplicate-detection.ts

  - id: dome.markdown.stale-dates
    version: 0.1.0
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md"]
    module: processors/stale-dates.ts

  - id: dome.markdown.orphan-pages
    version: 0.1.0
    phase: view
    triggers:
      - kind: command
        name: orphan-pages
    capabilities:
      - kind: read
        paths: ["**/*.md"]
    module: processors/orphan-pages.ts
