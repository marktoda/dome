id: dome.markdown
version: 0.4.5
processors:
  - id: dome.markdown.validate-wikilinks
    version: 0.3.0
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: patch.auto
        paths: ["**/*.md"]
      - kind: question.ask
    module: processors/validate-wikilinks.ts

  - id: dome.markdown.ambiguous-wikilink-answer
    version: 0.1.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.markdown.validate-wikilinks
        idempotencyKeyPrefix: "dome.markdown.ambiguous-wikilink:"
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: patch.auto
        paths: ["**/*.md"]
    module: processors/ambiguous-wikilink-answer.ts

  - id: dome.markdown.repair-wikilinks
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "5 5 * * *"
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: patch.auto
        paths: ["**/*.md"]
    module: processors/repair-wikilinks.ts

  - id: dome.markdown.normalize-frontmatter
    version: 0.2.1
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: patch.auto
        paths: ["**/*.md"]
    module: processors/normalize-frontmatter.ts

  - id: dome.markdown.lint-frontmatter
    version: 0.1.4
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md", ".dome/page-types.yaml"]
    module: processors/lint-frontmatter.ts

  - id: dome.markdown.broken-images
    version: 0.1.0
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md", "**/*.{png,jpg,jpeg,gif,webp,svg,avif}"]
    module: processors/broken-images.ts

  - id: dome.markdown.duplicate-detection
    version: 0.1.1
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: question.ask
    module: processors/duplicate-detection.ts

  - id: dome.markdown.duplicate-detection-answer
    version: 0.1.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.markdown.duplicate-detection
        idempotencyKeyPrefix: "dome.markdown.duplicate-detection:"
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: patch.auto
        paths: ["wiki/syntheses/*.md"]
    module: processors/duplicate-detection-answer.ts

  - id: dome.markdown.stale-dates
    version: 0.1.2
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md"]
    module: processors/stale-dates.ts

  - id: dome.markdown.refresh-updated
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "0 5 * * *"
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: patch.auto
        paths: ["**/*.md"]
    module: processors/refresh-updated.ts

  - id: dome.markdown.raw-immutable
    version: 0.1.0
    phase: adoption
    triggers:
      - kind: signal
        name: file.modified
        pathPattern: raw/**
      - kind: signal
        name: file.deleted
        pathPattern: raw/**
    capabilities:
      - kind: read
        paths: ["raw/**"]
    module: processors/raw-immutable.ts

  - id: dome.markdown.orphan-pages
    version: 0.1.0
    phase: view
    triggers:
      - kind: command
        name: orphan-pages
    capabilities:
      - kind: read
        paths: ["**/*.md"]
    module: processors/orphan-pages.ts
