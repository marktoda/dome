id: dome.markdown
version: 0.1.0
processors:
  - id: dome.markdown.validate-wikilinks
    version: 0.1.0
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md"]
    module: processors/validate-wikilinks.ts
