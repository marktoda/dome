id: dome.markdown
version: 0.7.0
processors:
  - id: dome.markdown.page-status
    version: 0.1.0
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
      - kind: signal
        name: file.deleted
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: graph.write
        namespaces: ["dome.page.*"]
    module: processors/page-status.ts

  - id: dome.markdown.lint-supersession
    version: 0.1.2
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
      - kind: signal
        name: file.deleted
    capabilities:
      - kind: read
        paths: ["**/*.md"]
    inspection:
      kind: all-readable-markdown
    # Whole-vault scan: reads + parses status of every readable markdown page
    # on each run. Measured near-linear and read-bound post the makeSnapshot
    # OID-index fix: ~0.3s at 1k files, ~0.8s at 2k (synthetic bench, medians).
    # Even so, this fired 62 timeouts/7d at 30s on the ~1k-file live vault
    # (pre-fix), so take the full 60s adoption ceiling — the merge gate stays
    # bounded and the headroom absorbs cold caches and loaded machines.
    execution:
      class: deterministic
      timeoutMs: 60000
    module: processors/lint-supersession.ts

  - id: dome.markdown.validate-wikilinks
    version: 0.4.2
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: patch.auto
        paths: ["**/*.md"]
      - kind: question.ask
    inspection:
      kind: all-readable-markdown
    # Whole-vault scan, same shape as lint-supersession. Measured near-linear
    # and read-bound: ~0.3-0.5s at 1k files, ~0.6-1.2s at 2k (synthetic bench,
    # medians; the fuzzy-suggest pass adds an O(broken-links × files) term
    # that stays sub-second at realistic broken-link counts). It still fired
    # 43 timeouts/7d riding the 10s adoption default on the ~1k-file live
    # vault (pre the makeSnapshot OID-index fix); 30s explicit headroom keeps
    # the merge gate bounded (adoption ceiling is 60s).
    execution:
      class: deterministic
      timeoutMs: 30000
    module: processors/validate-wikilinks.ts

  - id: dome.markdown.ambiguous-wikilink-answer
    version: 0.1.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.markdown.validate-wikilinks
        idempotencyKeyPrefix: "dome.markdown.ambiguous-wikilink:"
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: patch.auto
        paths: ["**/*.md"]
    module: processors/ambiguous-wikilink-answer.ts

  - id: dome.markdown.repair-wikilinks
    version: 0.2.1
    phase: garden
    triggers:
      - kind: schedule
        cron: "5 5 * * *"
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: patch.auto
        paths: ["**/*.md"]
    module: processors/repair-wikilinks.ts

  - id: dome.markdown.render-index
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "15 5 * * *"
      - kind: signal
        name: file.created
        pathPattern: "wiki/**/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "wiki/**/*.md"
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      # index-*.md (root) is the LEGACY shard layout — retained so retirement can delete old shards; drop in a later release.
      - kind: patch.auto
        paths: ["index.md", "index-*.md", "meta/index-*.md"]
    module: processors/render-index.ts

  - id: dome.markdown.normalize-frontmatter
    version: 0.2.1
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: patch.auto
        paths: ["**/*.md"]
    module: processors/normalize-frontmatter.ts

  - id: dome.markdown.lint-frontmatter
    version: 0.1.4
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md", ".dome/page-types.yaml"]
    module: processors/lint-frontmatter.ts

  - id: dome.markdown.broken-images
    version: 0.1.2
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
      - kind: signal
        name: file.deleted
        pathPattern: "**/*.{png,jpg,jpeg,gif,webp,svg,avif}"
    capabilities:
      - kind: read
        paths: ["**/*.md", "**/*.{png,jpg,jpeg,gif,webp,svg,avif}"]
    inspection:
      kind: all-readable-markdown
    # When an image is added/deleted this re-reads every markdown page and
    # stats every referenced image — a whole-vault pass that can exceed the
    # 10s adoption default on a large vault. 20s headroom (the per-tick
    # exposure is rarer than lint-supersession's, since it only widens to
    # the whole vault on an image change).
    execution:
      class: deterministic
      timeoutMs: 20000
    module: processors/broken-images.ts

  - id: dome.markdown.stale-dates
    version: 0.1.2
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
      - kind: signal
        name: file.created
    capabilities:
      - kind: read
        paths: ["**/*.md"]
    module: processors/stale-dates.ts

  - id: dome.markdown.refresh-updated
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "0 5 * * *"
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      - kind: patch.auto
        paths: ["**/*.md"]
    module: processors/refresh-updated.ts

  - id: dome.markdown.attic-sweep
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "45 4 * * 0"
    capabilities:
      - kind: read
        paths: ["**/*.md"]
      # The archive-move never applies inline — it lands in proposals.db for
      # `dome apply` (stock-gardening phase 1, Task 7), same posture as
      # dome.agent.garden's semantic proposals: a SEPARATE capability
      # from patch.auto, and ManifestGrantEntry's kind enum ("read" |
      # "patch.auto" | "graph.write") has no patch.propose slot, so this
      # relies on the general kind-level `capability.grant-missing` doctor
      # probe rather than a doctor.grantEntries row.
      - kind: patch.propose
        paths: ["notes/**", "wiki/**", "attic/**"]
    module: processors/attic-sweep.ts

  - id: dome.markdown.core-size
    version: 0.1.0
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "core.md"
      - kind: signal
        name: file.created
        pathPattern: "core.md"
    capabilities:
      - kind: read
        paths: ["core.md"]
    module: processors/core-size.ts

  - id: dome.markdown.raw-immutable
    version: 0.1.0
    phase: adoption
    triggers:
      - kind: signal
        name: file.modified
        pathPattern: raw/**
      - kind: signal
        name: file.deleted
        pathPattern: raw/**
    capabilities:
      - kind: read
        paths: ["raw/**"]
    module: processors/raw-immutable.ts

  - id: dome.markdown.orphan-pages
    version: 0.1.0
    phase: view
    triggers:
      - kind: command
        name: orphan-pages
    capabilities:
      - kind: read
        paths: ["**/*.md"]
    module: processors/orphan-pages.ts

# Doctor contributions: grant-entry probes (see dome.daily/manifest.yaml).
doctor:
  grantEntries:
    - processorId: dome.markdown.core-size
      entries:
        - kind: read
          target: core.md
      why: >-
        the core-memory size lint never fires (its effective read scope is
        empty)
      recovery: >-
        Add "core.md" to extensions.dome.markdown.grant.read in
        .dome/config.yaml.
    - processorId: dome.markdown.render-index
      entries:
        - kind: patch.auto
          target: index.md
        - kind: patch.auto
          target: meta/index-*.md
      why: >-
        the generated index projection is never written, so index.md and its
        per-category shards under meta/ go stale while agents no longer
        maintain them by hand
      recovery: >-
        Add "index.md", "index-*.md", and "meta/index-*.md" to
        extensions.dome.markdown.grant.patch.auto in .dome/config.yaml.
    - processorId: dome.markdown.page-status
      entries:
        - kind: graph.write
          target: dome.page.status
      why: >-
        page supersession facts are dropped by the broker, so superseded
        pages are neither linted against nor downranked
      recovery: >-
        Add "dome.page.*" to extensions.dome.markdown.grant.graph.write in
        .dome/config.yaml.
