id: dome.agent
version: 0.2.0
processors:
  - id: dome.agent.ingest
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: file.created
        pathPattern: "inbox/raw/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "inbox/raw/*.md"
    capabilities:
      - kind: read
        paths:
          - "wiki/**/*.md"
          - "notes/**/*.md"
          - "inbox/**/*.md"
          - "index.md"
          - "log.md"
      - kind: patch.auto
        paths:
          - "wiki/**/*.md"
          - "notes/**/*.md"
          - "index.md"
          - "log.md"
          - "inbox/processed/*.md"
          - "inbox/raw/*.md"
      - kind: model.invoke
        maxDailyCostUsd: 5
      - kind: question.ask
    execution:
      class: llm
      # 30 min total: the processor loops over every changed inbox/raw/*.md in
      # one run, so a multi-source commit (several articles at once) shares this
      # budget across all of them.
      timeoutMs: 1800000
      modelCallTimeoutMs: 180000
    module: processors/ingest.ts

  - id: dome.agent.inbox-stale-check
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "0 * * * *"
      - kind: signal
        name: file.created
        pathPattern: "inbox/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "inbox/**/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "inbox/**/*.md"
    capabilities:
      - kind: read
        paths: ["inbox/**/*.md"]
    module: processors/inbox-stale-check.ts

  - id: dome.agent.consolidate
    version: 0.2.0
    phase: garden
    triggers:
      # Nightly (was weekly 0 4 * * 1): the charter bounds each run to recent
      # drift since the ledger's last run + a hard per-run patch cap.
      - kind: schedule
        cron: "0 2 * * *"
    capabilities:
      - kind: read
        paths:
          - "wiki/**/*.md"
          - "index.md"
          - "log.md"
          - "consolidation-ledger.md"
      - kind: patch.auto
        paths:
          - "wiki/**/*.md"
          - "index.md"
          - "log.md"
          - "consolidation-ledger.md"
      - kind: model.invoke
        maxDailyCostUsd: 10
      - kind: question.ask
    execution:
      class: llm
      timeoutMs: 1800000
      modelCallTimeoutMs: 180000
    module: processors/consolidate.ts

  - id: dome.agent.brief
    version: 0.1.0
    phase: garden
    triggers:
      # 05:30, before dome.daily.create-daily's 06:00 tick. The brief creates
      # the daily skeleton itself when absent (same shared helper), so
      # create-daily later no-ops and carry-forward raises the open loops.
      - kind: schedule
        cron: "30 5 * * *"
    capabilities:
      - kind: read
        paths:
          - "wiki/**/*.md"
          - "notes/**/*.md"
          - "index.md"
          - "log.md"
          - "sources/calendar/*.md"
      # Deliberately narrower than ingest: the brief writes ONLY the daily
      # note (wiki/dailies default template or a notes/ daily_path override).
      - kind: patch.auto
        paths:
          - "wiki/dailies/*.md"
          - "notes/*.md"
      - kind: model.invoke
        maxDailyCostUsd: 5
      - kind: question.ask
    execution:
      class: llm
      timeoutMs: 1800000
      modelCallTimeoutMs: 180000
    module: processors/brief.ts
