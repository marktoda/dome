id: dome.agent
version: 0.4.1
processors:
  - id: dome.agent.ingest
    version: 0.3.0
    phase: garden
    triggers:
      - kind: signal
        name: file.created
        pathPattern: "inbox/raw/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "inbox/raw/*.md"
    capabilities:
      - kind: read
        paths:
          - "wiki/**/*.md"
          - "notes/**/*.md"
          - "inbox/**/*.md"
          - "index.md"
          - "log.md"
          # Owner core memory — read-only by design (propose-only page):
          # core.md appears in NO agent patch.auto declaration; the single
          # auto-writer is the preference-promotion answer handler below. A
          # custom core_path needs a matching vault read grant (same rule as
          # the ledger path).
          - "core.md"
          # Preference signals (M5): appended within the normal grant when
          # the owner's content corrects agent behavior.
          - "preferences/signals.md"
      - kind: patch.auto
        paths:
          - "wiki/**/*.md"
          - "notes/**/*.md"
          - "index.md"
          - "log.md"
          - "inbox/processed/*.md"
          - "inbox/raw/*.md"
          - "preferences/signals.md"
      - kind: model.invoke
        maxDailyCostUsd: 5
      - kind: question.ask
    execution:
      class: llm
      # 30 min total: the processor loops over every changed inbox/raw/*.md in
      # one run, so a multi-source commit (several articles at once) shares this
      # budget across all of them.
      timeoutMs: 1800000
      modelCallTimeoutMs: 180000
    module: processors/ingest.ts

  - id: dome.agent.inbox-stale-check
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "0 * * * *"
      - kind: signal
        name: file.created
        pathPattern: "inbox/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "inbox/**/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "inbox/**/*.md"
    capabilities:
      - kind: read
        paths: ["inbox/**/*.md"]
    module: processors/inbox-stale-check.ts

  - id: dome.agent.consolidate
    version: 0.2.2
    phase: garden
    triggers:
      # Nightly (was weekly 0 4 * * 1): the charter bounds each run to recent
      # drift since the ledger's last run + a hard per-run patch cap.
      - kind: schedule
        cron: "0 2 * * *"
    capabilities:
      - kind: read
        paths:
          - "wiki/**/*.md"
          - "index.md"
          - "log.md"
          - "consolidation-ledger.md"
          # Owner core memory — read-only by design (propose-only page).
          - "core.md"
          - "preferences/signals.md"
      - kind: patch.auto
        paths:
          - "wiki/**/*.md"
          - "index.md"
          - "log.md"
          - "consolidation-ledger.md"
          - "preferences/signals.md"
      - kind: model.invoke
        maxDailyCostUsd: 10
      - kind: question.ask
    execution:
      class: llm
      timeoutMs: 1800000
      modelCallTimeoutMs: 180000
    module: processors/consolidate.ts

  - id: dome.agent.brief
    version: 0.1.5
    phase: garden
    triggers:
      # 05:30, before dome.daily.create-daily's 06:00 tick. The brief creates
      # the daily skeleton itself when absent (same shared helper), so
      # create-daily later no-ops and carry-forward raises the open loops.
      - kind: schedule
        cron: "30 5 * * *"
    capabilities:
      - kind: read
        paths:
          - "wiki/**/*.md"
          - "notes/**/*.md"
          - "index.md"
          - "log.md"
          - "sources/calendar/*.md"
          # The questions batch is scope-filtered by this read grant: a
          # question whose sourceRefs include an unreadable path is dropped
          # from ctx.projection.questions. Ingest's askOwner questions ref
          # inbox/raw/*.md and consolidate's ref the consolidation ledger, so
          # both must be readable here. A custom consolidation_ledger_path
          # needs a matching grant (same rule as consolidate's own grant).
          - "inbox/**/*.md"
          - "consolidation-ledger.md"
          # Owner core memory — read-only by design (propose-only page).
          - "core.md"
          # Preference-promotion questions ref signal lines, so the brief's
          # scoped questions batch needs this readable too.
          - "preferences/signals.md"
          # Sweep ledger: the brief reads today's run section for the
          # "Integrated overnight" digest block (deterministic, never model-
          # written). Default path is sweep-ledger.md; a custom sweep_ledger_path
          # additionally needs a matching vault read grant in .dome/config.yaml.
          - "sweep-ledger.md"
      # Deliberately narrower than ingest: the brief writes ONLY the daily
      # note (wiki/dailies default template or a notes/ daily_path override)
      # plus validated signal-line appends (the splice guard drops any
      # signals-page edit that is not an append of well-formed signal lines).
      - kind: patch.auto
        paths:
          - "wiki/dailies/*.md"
          - "notes/*.md"
          - "preferences/signals.md"
      - kind: model.invoke
        maxDailyCostUsd: 5
      - kind: question.ask
    execution:
      class: llm
      timeoutMs: 1800000
      modelCallTimeoutMs: 180000
    module: processors/brief.ts

  - id: dome.agent.sweep
    version: 0.1.0
    phase: garden
    triggers:
      # 03:00 — between consolidate (02:00) and the brief (05:30), so the
      # brief's "Integrated overnight" digest renders tonight's run.
      - kind: schedule
        cron: "0 3 * * *"
    capabilities:
      - kind: read
        paths:
          - "wiki/**/*.md"
          - "inbox/processed/*.md"
          - "index.md"
          - "core.md"
          - "sweep-ledger.md"
      # Deliberately NARROWER than the read grant and matching the default
      # sweep_targets globs — the broker enforces what the charter promises
      # (each per-item agent run is narrower still: exactly one destination).
      # sweep-tools.ts SWEEP_WRITABLE_PATHS mirrors this list, pinned by the
      # grant-aware-tools manifest-sync test.
      - kind: patch.auto
        paths:
          - "wiki/entities/**/*.md"
          - "wiki/concepts/**/*.md"
          - "sweep-ledger.md"
      - kind: model.invoke
        maxDailyCostUsd: 10
      - kind: question.ask
    execution:
      class: llm
      timeoutMs: 1800000
      modelCallTimeoutMs: 180000
    module: processors/sweep.ts

  - id: dome.agent.sweep-answer
    version: 0.1.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.agent.sweep
        idempotencyKeyPrefix: "dome.agent.sweep:"
    capabilities:
      - kind: read
        paths:
          - "wiki/**/*.md"
          - "sweep-ledger.md"
      - kind: patch.auto
        paths:
          - "wiki/entities/**/*.md"
          - "wiki/concepts/**/*.md"
    module: processors/sweep-answer.ts

  # ----- Preference promotion (memory-quality M5) ----------------------------
  # docs/wiki/specs/preferences.md. Three deterministic processors — no model.

  - id: dome.agent.preference-signals
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: file.created
        pathPattern: "preferences/signals.md"
      - kind: signal
        name: document.changed
        pathPattern: "preferences/signals.md"
      - kind: signal
        name: file.deleted
        pathPattern: "preferences/signals.md"
      # core.md flips topic state to/from `promoted`, so the counter re-runs
      # when the core page changes.
      - kind: signal
        name: file.created
        pathPattern: "core.md"
      - kind: signal
        name: document.changed
        pathPattern: "core.md"
    capabilities:
      - kind: read
        paths:
          - "preferences/signals.md"
          - "core.md"
      - kind: graph.write
        namespaces: ["dome.preference.*"]
    # Deterministic + read/graph.write-only keeps this in the rebuild-safe
    # garden set (isRebuildEligibleGardenProcessor); all-readable-markdown
    # inspection lets vanished topics' stale facts clear on any run.
    execution:
      class: deterministic
    inspection:
      kind: all-readable-markdown
    module: processors/preference-signals.ts

  - id: dome.agent.preference-promotion
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: file.created
        pathPattern: "preferences/signals.md"
      - kind: signal
        name: document.changed
        pathPattern: "preferences/signals.md"
      - kind: signal
        name: file.created
        pathPattern: "core.md"
      - kind: signal
        name: document.changed
        pathPattern: "core.md"
    capabilities:
      - kind: read
        paths:
          - "preferences/signals.md"
          - "core.md"
      - kind: question.ask
    execution:
      class: deterministic
    module: processors/preference-promotion.ts

  - id: dome.agent.preference-promotion-answer
    version: 0.1.1
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.agent.preference-promotion
        idempotencyKeyPrefix: "dome.agent.preference-promotion:"
    capabilities:
      # THE single auto-writer to core.md (memory decision 4; preferences.md
      # §"The single-auto-writer exception"): the promotion question WAS the
      # owner review. Narrow by construction — exactly the core page and the
      # signals page (rejection tombstones); the vault config mirrors this
      # with a per-processor replacement grant.
      - kind: read
        paths:
          - "core.md"
          - "preferences/signals.md"
      - kind: patch.auto
        paths:
          - "core.md"
          - "preferences/signals.md"
    module: processors/preference-promotion-answer.ts
