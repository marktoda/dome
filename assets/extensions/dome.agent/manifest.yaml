id: dome.agent
version: 0.5.0
processors:
  - id: dome.agent.ingest
    version: 0.3.0
    phase: garden
    triggers:
      - kind: signal
        name: file.created
        pathPattern: "inbox/raw/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "inbox/raw/*.md"
    capabilities:
      - kind: read
        paths:
          - "wiki/**/*.md"
          - "notes/**/*.md"
          - "inbox/**/*.md"
          - "index.md"
          - "log.md"
          # Owner core memory — read-only by design (propose-only page):
          # core.md appears in NO model-class agent patch.auto declaration;
          # its only gated writers are the two deterministic block owners
          # below (preference-promotion-answer → promoted-preferences,
          # active-projects → active-projects). A custom core_path needs a
          # matching vault read grant (same rule as the ledger path).
          - "core.md"
          # Preference signals (M5): appended within the normal grant when
          # the owner's content corrects agent behavior.
          - "preferences/signals.md"
      # index.md and log.md are read-only above (the core.md grant shape):
      # the index regenerates from description: frontmatter, log.md is
      # frozen history. The grant-aware tools deny them at tool time so a
      # stray write cannot poison the all-or-nothing PatchEffect verdict.
      - kind: patch.auto
        paths:
          - "wiki/**/*.md"
          - "notes/**/*.md"
          - "inbox/processed/*.md"
          - "inbox/raw/*.md"
          - "preferences/signals.md"
      - kind: model.invoke
        # Bounds ingest's OWN daily spend (a few articles' worth); the
        # extension-wide pool is the vault grant's job. Do not size this
        # for sweep/consolidate's burn — per-processor declared caps no
        # longer compete with the pool (capabilities.md §model.invoke).
        maxDailyCostUsd: 5
      - kind: question.ask
    execution:
      class: llm
      # 30 min total: the processor loops over every changed inbox/raw/*.md in
      # one run, so a multi-source commit (several articles at once) shares this
      # budget across all of them.
      timeoutMs: 1800000
      modelCallTimeoutMs: 180000
    module: processors/ingest.ts

  - id: dome.agent.inbox-stale-check
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "0 * * * *"
      - kind: signal
        name: file.created
        pathPattern: "inbox/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "inbox/**/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "inbox/**/*.md"
    capabilities:
      - kind: read
        paths: ["inbox/**/*.md"]
    module: processors/inbox-stale-check.ts

  - id: dome.agent.consolidate
    version: 0.2.2
    phase: garden
    triggers:
      # Nightly (was weekly 0 4 * * 1): the charter bounds each run to recent
      # drift since the ledger's last run + a hard per-run patch cap.
      - kind: schedule
        cron: "0 2 * * *"
    capabilities:
      - kind: read
        paths:
          - "wiki/**/*.md"
          - "index.md"
          - "log.md"
          - "meta/consolidation-ledger.md"
          # Owner core memory — read-only by design (propose-only page).
          - "core.md"
          - "preferences/signals.md"
      # index.md and log.md are read-only above (the core.md grant shape):
      # the index regenerates from description: frontmatter, log.md is
      # frozen history. The grant-aware tools deny them at tool time so a
      # stray write cannot poison the all-or-nothing PatchEffect verdict.
      - kind: patch.auto
        paths:
          - "wiki/**/*.md"
          - "meta/consolidation-ledger.md"
          - "preferences/signals.md"
      - kind: model.invoke
        maxDailyCostUsd: 10
      - kind: question.ask
    execution:
      class: llm
      timeoutMs: 1800000
      modelCallTimeoutMs: 180000
    module: processors/consolidate.ts

  - id: dome.agent.brief
    version: 0.2.0
    phase: garden
    triggers:
      # 05:30, before dome.daily.create-daily's 06:00 tick. The brief creates
      # the daily skeleton itself when absent (same shared helper), so
      # create-daily later no-ops and carry-forward raises the open loops.
      - kind: schedule
        cron: "30 5 * * *"
      # Wake-tick choreography: a laptop wake-tick can fire the brief in the
      # same burst as the calendar/slack fetch emission, but the fetches
      # complete async (outbox → command → commit → adoption) — so a
      # wake-tick brief composes sourceless. These signals are the late
      # arrival's knock; the processor's deterministic, model-free gate
      # (the dome.agent.brief:sources record in today's daily) decides
      # between a free no-op and at most one re-compose per source kind
      # per day. The 05:30 cron path is unchanged by the gate.
      - kind: signal
        name: file.created
        pathPattern: "sources/calendar/*.md"
      - kind: signal
        name: file.created
        pathPattern: "sources/slack/*.md"
    capabilities:
      - kind: read
        paths:
          - "wiki/**/*.md"
          - "notes/**/*.md"
          - "index.md"
          - "log.md"
          - "sources/calendar/*.md"
          - "sources/slack/*.md"
          # The questions batch is scope-filtered by this read grant: a
          # question whose sourceRefs include an unreadable path is dropped
          # from ctx.projection.questions. Ingest's askOwner questions ref
          # inbox/raw/*.md and consolidate's ref the consolidation ledger, so
          # both must be readable here. A custom consolidation_ledger_path
          # needs a matching grant (same rule as consolidate's own grant).
          - "inbox/**/*.md"
          - "meta/consolidation-ledger.md"
          # Owner core memory — read-only by design (propose-only page).
          - "core.md"
          # Preference-promotion questions ref signal lines, so the brief's
          # scoped questions batch needs this readable too.
          - "preferences/signals.md"
          # Sweep ledger: the brief reads today's run section for the
          # "Integrated overnight" digest block (deterministic, never model-
          # written). Default path is meta/sweep-ledger.md; a custom sweep_ledger_path
          # additionally needs a matching vault read grant in .dome/config.yaml.
          - "meta/sweep-ledger.md"
      # Deliberately narrower than ingest: the brief writes ONLY the daily
      # note (wiki/dailies default template or a notes/ daily_path override)
      # plus validated signal-line appends (the splice guard drops any
      # signals-page edit that is not an append of well-formed signal lines).
      - kind: patch.auto
        paths:
          - "wiki/dailies/*.md"
          - "notes/*.md"
          - "preferences/signals.md"
      - kind: model.invoke
        maxDailyCostUsd: 5
      - kind: question.ask
    execution:
      class: llm
      timeoutMs: 1800000
      modelCallTimeoutMs: 180000
    module: processors/brief.ts

  - id: dome.agent.sweep
    version: 0.1.0
    phase: garden
    triggers:
      # 03:00 — between consolidate (02:00) and the brief (05:30), so the
      # brief's "Integrated overnight" digest renders tonight's run.
      - kind: schedule
        cron: "0 3 * * *"
    capabilities:
      - kind: read
        paths:
          - "wiki/**/*.md"
          - "inbox/processed/*.md"
          - "index.md"
          - "core.md"
          - "meta/sweep-ledger.md"
      # Deliberately NARROWER than the read grant and matching the default
      # sweep_targets globs — the broker enforces what the charter promises
      # (each per-item agent run is narrower still: exactly one destination).
      # sweep-tools.ts SWEEP_WRITABLE_PATHS mirrors this list, pinned by the
      # grant-aware-tools manifest-sync test.
      - kind: patch.auto
        paths:
          - "wiki/entities/**/*.md"
          - "wiki/concepts/**/*.md"
          - "meta/sweep-ledger.md"
      - kind: model.invoke
        maxDailyCostUsd: 10
      - kind: question.ask
    execution:
      class: llm
      timeoutMs: 1800000
      modelCallTimeoutMs: 180000
    module: processors/sweep.ts

  - id: dome.agent.sweep-answer
    version: 0.1.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.agent.sweep
        idempotencyKeyPrefix: "dome.agent.sweep:"
    capabilities:
      - kind: read
        paths:
          - "wiki/**/*.md"
          - "meta/sweep-ledger.md"
      - kind: patch.auto
        paths:
          - "wiki/entities/**/*.md"
          - "wiki/concepts/**/*.md"
    module: processors/sweep-answer.ts

  # ----- Preference promotion (memory-quality M5) ----------------------------
  # docs/wiki/specs/preferences.md. Three deterministic processors — no model.

  - id: dome.agent.preference-signals
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: file.created
        pathPattern: "preferences/signals.md"
      - kind: signal
        name: document.changed
        pathPattern: "preferences/signals.md"
      - kind: signal
        name: file.deleted
        pathPattern: "preferences/signals.md"
      # core.md flips topic state to/from `promoted`, so the counter re-runs
      # when the core page changes.
      - kind: signal
        name: file.created
        pathPattern: "core.md"
      - kind: signal
        name: document.changed
        pathPattern: "core.md"
    capabilities:
      - kind: read
        paths:
          - "preferences/signals.md"
          - "core.md"
      - kind: graph.write
        namespaces: ["dome.preference.*"]
    # Deterministic + read/graph.write-only keeps this in the rebuild-safe
    # garden set (isRebuildEligibleGardenProcessor); all-readable-markdown
    # inspection lets vanished topics' stale facts clear on any run.
    execution:
      class: deterministic
    inspection:
      kind: all-readable-markdown
    module: processors/preference-signals.ts

  - id: dome.agent.preference-promotion
    version: 0.2.0
    phase: garden
    triggers:
      - kind: signal
        name: file.created
        pathPattern: "preferences/signals.md"
      - kind: signal
        name: document.changed
        pathPattern: "preferences/signals.md"
      - kind: signal
        name: file.created
        pathPattern: "core.md"
      - kind: signal
        name: document.changed
        pathPattern: "core.md"
    capabilities:
      - kind: read
        paths:
          - "preferences/signals.md"
          - "core.md"
      - kind: question.ask
    execution:
      class: deterministic
    module: processors/preference-promotion.ts

  - id: dome.agent.preference-promotion-answer
    version: 0.2.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.agent.preference-promotion
        idempotencyKeyPrefix: "dome.agent.preference-promotion:"
      # Demotion questions (WS1 pruning) come from the same emitter under a
      # second key family; the SAME gated writer handles both — two answer
      # paths, no third core.md writer, no grant change.
      - kind: answer
        questionProcessorId: dome.agent.preference-promotion
        idempotencyKeyPrefix: "dome.agent.preference-demotion:"
    capabilities:
      # One of core.md's TWO gated writers (memory decision 4 evolved;
      # preferences.md §"The two-gated-writers contract"): the promotion
      # question WAS the owner review, and this handler owns exactly the
      # promoted-preferences block. dome.agent.active-projects below owns
      # the active-projects block — every core.md patch.auto holder owns a
      # distinct generated block name. Narrow by construction — exactly the
      # core page and the signals page (rejection tombstones); the vault
      # config mirrors this with a per-processor replacement grant.
      - kind: read
        paths:
          - "core.md"
          - "preferences/signals.md"
      - kind: patch.auto
        paths:
          - "core.md"
          - "preferences/signals.md"
    module: processors/preference-promotion-answer.ts

  - id: dome.agent.active-projects
    version: 0.1.0
    phase: garden
    triggers:
      # 05:20 — after the 05:15 index render, before the 05:30 brief, so the
      # brief's core-memory injection reads a fresh active-projects block.
      - kind: schedule
        cron: "20 5 * * *"
      # Re-render when a daily changes: settling or surfacing an open loop
      # is what moves the tallies.
      - kind: signal
        name: document.changed
        pathPattern: "wiki/dailies/*.md"
    capabilities:
      # The OTHER gated core.md writer (two-gated-writers contract, see the
      # promotion answer handler above): deterministic, block-scoped — it
      # rewrites only the dome.agent:active-projects generated block.
      # Reads are minimal by construction: the dailies feed the tallies and
      # core.md is the splice target; nothing else is consulted.
      - kind: read
        paths:
          - "core.md"
          - "wiki/dailies/*.md"
      - kind: patch.auto
        paths:
          - "core.md"
    execution:
      class: deterministic
    module: processors/active-projects.ts

# Doctor contributions: grant-entry probes (see dome.daily/manifest.yaml).
doctor:
  grantEntries:
    - processorId: dome.agent.brief
      entries:
        - kind: read
          target: core.md
      why: >-
        agents cannot load the owner's core-memory page into their task
        turns
      recovery: >-
        Add "core.md" to extensions.dome.agent.grant.read in
        .dome/config.yaml.
    - processorId: dome.agent.brief
      entries:
        - kind: read
          target: preferences/signals.md
        - kind: patch.auto
          target: preferences/signals.md
      why: >-
        preference signal lines can be neither read nor appended, so
        preference promotion never accumulates evidence
      recovery: >-
        Add "preferences/signals.md" to extensions.dome.agent.grant.read
        and extensions.dome.agent.grant.patch.auto in .dome/config.yaml.
    - processorId: dome.agent.brief
      entries:
        - kind: read
          target: sources/calendar/2026-01-01.md
      why: >-
        calendar source days are grant-scoped out of the brief's snapshot,
        so the daily Meetings weave silently renders nothing
      recovery: >-
        Add "sources/calendar/*.md" to extensions.dome.agent.grant.read in
        .dome/config.yaml.
    - processorId: dome.agent.brief
      entries:
        - kind: read
          target: sources/slack/2026-01-01.md
      why: >-
        Slack digest days are grant-scoped out of the brief's snapshot, so
        the overnight Slack weave silently renders nothing
      recovery: >-
        Add "sources/slack/*.md" to extensions.dome.agent.grant.read in
        .dome/config.yaml.
    - processorId: dome.agent.preference-signals
      entries:
        - kind: graph.write
          target: dome.preference.topic
      why: >-
        the deterministic preference counter's dome.preference.topic facts
        are dropped by the broker
      recovery: >-
        Add "dome.preference.*" to extensions.dome.agent.grant.graph.write
        in .dome/config.yaml.
    - processorId: dome.agent.preference-promotion-answer
      entries:
        - kind: read
          target: core.md
        - kind: read
          target: preferences/signals.md
        - kind: patch.auto
          target: core.md
        - kind: patch.auto
          target: preferences/signals.md
      why: >-
        owner-approved preference promotions cannot be written to core.md
        (the two-gated-writers contract in wiki/specs/preferences.md)
      recovery: >-
        Add the per-processor replacement grant stanza in .dome/config.yaml:
        extensions.dome.agent.processors."dome.agent.preference-promotion-answer".grant
        with read: ["core.md", "preferences/signals.md"] and patch.auto:
        ["core.md", "preferences/signals.md"].
    - processorId: dome.agent.active-projects
      entries:
        - kind: read
          target: core.md
        - kind: read
          target: wiki/dailies/2026-01-01.md
        - kind: patch.auto
          target: core.md
      why: >-
        the active-projects generated block in core.md is never refreshed,
        so the brief's core-memory injection reads stale project tallies
      recovery: >-
        Add the per-processor replacement grant stanza in .dome/config.yaml:
        extensions.dome.agent.processors."dome.agent.active-projects".grant
        with read: ["core.md", "wiki/dailies/*.md"] and patch.auto:
        ["core.md"].
