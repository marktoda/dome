id: dome.intake
version: 0.4.3
processors:
  - id: dome.intake.capture-index
    version: 0.1.1
    phase: adoption
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/generated/intake/*.md"
      - kind: signal
        name: file.created
        pathPattern: "wiki/generated/intake/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "wiki/generated/intake/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/generated/intake/*.md"]
      - kind: graph.write
        namespaces: ["dome.intake.*"]
      - kind: question.ask
    module: processors/capture-index.ts

  - id: dome.intake.extract-capture
    version: 0.3.3
    phase: garden
    triggers:
      - kind: signal
        name: file.created
        pathPattern: "inbox/raw/*.md"
    capabilities:
      - kind: read
        paths:
          - "inbox/raw/*.md"
          - "inbox/processed/*.md"
          - "wiki/generated/intake/*.md"
      - kind: patch.auto
        paths:
          - "wiki/generated/intake/*.md"
          - "inbox/processed/*.md"
          - "inbox/raw/*.md"
      - kind: model.invoke
        maxDailyCostUsd: 5
      - kind: question.ask
    execution:
      class: llm
      timeoutMs: 600000
      modelCallTimeoutMs: 180000
    module: processors/extract-capture.ts

  - id: dome.intake.inbox-stale-check
    version: 0.1.0
    phase: garden
    triggers:
      - kind: schedule
        cron: "0 * * * *"
      - kind: signal
        name: file.created
        pathPattern: "inbox/**/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "inbox/**/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "inbox/**/*.md"
    capabilities:
      - kind: read
        paths: ["inbox/**/*.md"]
    module: processors/inbox-stale-check.ts

  - id: dome.intake.synthesize-capture
    version: 0.1.1
    phase: garden
    triggers:
      - kind: signal
        name: file.created
        pathPattern: "wiki/generated/intake/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "wiki/generated/intake/*.md"
    capabilities:
      - kind: read
        paths:
          - "wiki/generated/intake/*.md"
          - "wiki/syntheses/intake-*.md"
      - kind: patch.auto
        paths: ["wiki/syntheses/intake-*.md"]
      - kind: model.invoke
        maxDailyCostUsd: 5
    execution:
      class: llm
      timeoutMs: 600000
      modelCallTimeoutMs: 180000
    module: processors/synthesize-capture.ts

  - id: dome.intake.synthesize-rollup
    version: 0.1.1
    phase: garden
    triggers:
      - kind: signal
        name: file.created
        pathPattern: "wiki/generated/intake/*.md"
      - kind: signal
        name: document.changed
        pathPattern: "wiki/generated/intake/*.md"
      - kind: signal
        name: file.deleted
        pathPattern: "wiki/generated/intake/*.md"
    capabilities:
      - kind: read
        paths:
          - "wiki/generated/intake/*.md"
          - "wiki/syntheses/intake-*.md"
      - kind: patch.auto
        paths: ["wiki/syntheses/intake-rollup.md"]
      - kind: model.invoke
        maxDailyCostUsd: 5
    execution:
      class: llm
      timeoutMs: 600000
      modelCallTimeoutMs: 180000
    module: processors/synthesize-rollup.ts

  - id: dome.intake.low-confidence-answer
    version: 0.2.1
    phase: garden
    triggers:
      - kind: answer
        idempotencyKeyPrefix: "dome.intake.low-confidence:"
    capabilities:
      - kind: read
        paths:
          - "inbox/raw/*.md"
          - "wiki/generated/intake/*.md"
      - kind: patch.auto
        paths: ["wiki/generated/intake/*.md"]
    module: processors/low-confidence-answer.ts
