id: dome.warden
version: 0.1.0
processors:
  - id: dome.warden.integrity
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md"]
      - kind: model.invoke
        maxDailyCostUsd: 10
      - kind: question.ask
    execution:
      class: llm
      timeoutMs: 600000
      modelCallTimeoutMs: 180000
    module: processors/integrity.ts

  - id: dome.warden.integrity-answer
    version: 0.1.0
    phase: garden
    triggers:
      - kind: answer
        questionProcessorId: dome.warden.integrity
        idempotencyKeyPrefix: "dome.warden.integrity:"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md"]
    module: processors/integrity-answer.ts

  - id: dome.warden.daily-briefing
    version: 0.1.0
    phase: garden
    # CRON ONLY. The processor WRITES a markdown page; a document.changed
    # trigger would re-fire on its own output and cascade. A schedule trigger
    # does not re-fire on the resulting sub-proposal's doc change, so the
    # garden cascade converges.
    triggers:
      - kind: schedule
        cron: "0 7 * * *"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md"]
      - kind: model.invoke
        maxDailyCostUsd: 10
      # Narrow patch.auto: ONLY the generated, derived briefing surface.
      - kind: patch.auto
        paths: ["wiki/generated/briefing/*.md"]
    execution:
      class: llm
      timeoutMs: 600000
      modelCallTimeoutMs: 180000
    module: processors/daily-briefing.ts
