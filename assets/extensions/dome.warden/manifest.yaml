id: dome.warden
version: 0.1.0
processors:
  - id: dome.warden.integrity
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/**/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/**/*.md"]
      - kind: model.invoke
        maxDailyCostUsd: 10
    execution:
      class: llm
      timeoutMs: 600000
      modelCallTimeoutMs: 180000
    module: processors/integrity.ts
