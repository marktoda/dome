# CI for the Dome SDK. Runs the same gate as the local `v1:check` script
# minus `v1:smoke`: the smoke script probes the repo's own dogfood vault at
# docs/, whose .dome/ operational state is gitignored, so it cannot pass on
# a fresh checkout. The bun test suite is hermetic by construction
# (tests/preload.ts blanks model-provider credentials and points the API
# base URL at an unroutable address before any test loads).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.13

      - name: Verify product host
        run: test "$(uname -m)" = "arm64"

      # Test fixtures drive real git repos; runners ship git but no
      # identity, and some scenarios shell out to plain `git commit`.
      - name: Configure git for test fixtures
        run: |
          git config --global user.name "dome-ci"
          git config --global user.email "ci@dome.invalid"
          git config --global init.defaultBranch main

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install PWA dependencies
        run: bun install --cwd pwa --frozen-lockfile

      - name: Typecheck (src + bundles + scripts)
        run: bun run typecheck

      - name: Check patch whitespace
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          zero=0000000000000000000000000000000000000000
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --check "$PR_BASE_SHA...$PR_HEAD_SHA"
          elif [ -n "$PUSH_BEFORE_SHA" ] && [ "$PUSH_BEFORE_SHA" != "$zero" ]; then
            git diff --check "$PUSH_BEFORE_SHA..$CURRENT_SHA"
          else
            # A new branch has no event.before range. Check the commit that
            # triggered the workflow without re-linting inherited history.
            git show --check --format= --root "$CURRENT_SHA"
          fi

      - name: Test SDK and product runtime
        run: bun run test

      - name: Check PWA
        run: bun run check:pwa
