# Dome vault configuration (v1.0).
#
# This vault is the Dome project's own design substrate. It dogfoods Dome on
# Dome as a project/design vault rather than a personal notes vault.

extensions:
  dome.lint:
    enabled: true
    grant:
      read:
        - "**/*.md"

  dome.markdown:
    enabled: true
    config:
      # The docs index is curated by hand — empty map disables render-index.
      index_categories: {}
    grant:
      read:
        - "wiki/**/*.md"
        # core.md feeds the dome.markdown.core-size lint; without this entry
        # the lint's effective read scope is empty and it never fires.
        - "core.md"
        - ".dome/page-types.yaml"
        - "**/*.{png,jpg,jpeg,gif,webp,svg,avif}"
        - "raw/**"
      patch.auto:
        - "wiki/**/*.md"
      graph.write:
        - "dome.page.*"
      question.ask: true
    processors:
      dome.markdown.validate-wikilinks:
        grant:
          read:
            - "**/*.md"
          patch.auto:
            - "**/*.md"
          question.ask: true
      # Mirror of validate-wikilinks' read widening: supersession forward
      # targets can live at the vault root (e.g. memory.md), and rule 1
      # resolves them against this processor's READABLE set — without the
      # override a root-level target raises a false missing-forward-link
      # warning.
      dome.markdown.lint-supersession:
        grant:
          read:
            - "**/*.md"

  dome.graph:
    enabled: true
    grant:
      read:
        - "**/*.md"
      graph.write:
        - "dome.graph.*"

  dome.daily:
    enabled: true
    grant:
      read:
        - "wiki/**/*.md"
      patch.auto:
        - "wiki/**/*.md"
      graph.write:
        - "dome.daily.*"
        - "dome.attention.*"
      question.ask: true

  dome.search:
    enabled: true
    grant:
      read:
        - "**/*.md"
      search.write:
        - "**/*.md"

  dome.health:
    enabled: true
    grant:
      read:
        - "**"
      outbox.read:
        - failed
      question.ask: true
      outbox.recover: true
      quarantine.read: true
      quarantine.recover: true
      run.read:
        - running
      run.recover: true

engine:
  max_iterations: 100
  auto_commit_workflows: true

git:
  auto_commit_workflows: true
