# Dome vault configuration (v1.0).
#
# This vault is the Dome project's own design substrate. It dogfoods Dome on
# Dome as a project/design vault rather than a personal notes vault.

extensions:
  dome.lint:
    enabled: true
    grant:
      read:
        - "**/*.md"

  dome.markdown:
    enabled: true
    grant:
      read:
        - "wiki/**/*.md"
        - ".dome/page-types.yaml"
        - "**/*.{png,jpg,jpeg,gif,webp,svg,avif}"
      patch.auto:
        - "wiki/**/*.md"
      question.ask: true
    processors:
      dome.markdown.validate-wikilinks:
        grant:
          read:
            - "**/*.md"

  dome.graph:
    enabled: true
    grant:
      read:
        - "**/*.md"
      graph.write:
        - "dome.graph.*"

  dome.daily:
    enabled: true
    grant:
      read:
        - "wiki/**/*.md"
      patch.auto:
        - "wiki/**/*.md"
      graph.write:
        - "dome.daily.*"
      question.ask: true

  dome.search:
    enabled: true
    grant:
      read:
        - "**/*.md"
      search.write:
        - "**/*.md"

  dome.health:
    enabled: true
    grant:
      read:
        - "**"
      outbox.read:
        - failed
      question.ask: true
      outbox.recover: true
      quarantine.read: true
      quarantine.recover: true
      run.read:
        - running
      run.recover: true

engine:
  max_iterations: 100
  auto_commit_workflows: true

git:
  auto_commit_workflows: true
