# Dome vault configuration (v1.0).
#
# This vault is the Dome project's own design substrate. It dogfoods Dome on
# Dome as a project/design vault rather than a personal notes vault.

extensions:
  dome.lint:
    enabled: true
    grant:
      read:
        - "**/*.md"

  dome.markdown:
    enabled: true
    config:
      # The docs index is curated by hand — empty map disables render-index.
      index_categories: {}
    grant:
      read:
        - "wiki/**/*.md"
        - "core.md"
        - ".dome/page-types.yaml"
        - "**/*.{png,jpg,jpeg,gif,webp,svg,avif}"
        - "raw/**"
      patch.auto:
        - "wiki/**/*.md"
        # render-index is disabled by index_categories: {}, but retaining its
        # exact declared scope keeps the installed processor honest and ready
        # if this vault opts back into generated indexes.
        - "index.md"
        - "index-*.md"
        - "meta/index-*.md"
      patch.propose:
        - "notes/**"
        - "wiki/**"
        - "attic/**"
      graph.write:
        - "dome.page.*"
      question.ask: true
    processors:
      dome.markdown.validate-wikilinks:
        grant:
          read:
            - "**/*.md"
          patch.auto:
            - "**/*.md"
          question.ask: true
      # Mirror of validate-wikilinks' read widening: supersession forward
      # targets can live at the vault root (e.g. memory.md), and rule 1
      # resolves them against this processor's READABLE set — without the
      # override a root-level target raises a false missing-forward-link
      # warning.
      dome.markdown.lint-supersession:
        grant:
          read:
            - "**/*.md"

  dome.graph:
    enabled: true
    grant:
      read:
        - "**/*.md"
      graph.write:
        - "dome.graph.*"

  # dome.daily is intentionally not enabled. This is a project/design vault:
  # daily notes only produced empty scaffolds here (no capture, no tasks, no
  # meetings) plus two engine commits of churn per day. The daily surface is
  # dogfooded in the personal work vault instead.

  dome.search:
    enabled: true
    grant:
      read:
        - "**/*.md"
      search.write:
        - "**/*.md"

  dome.health:
    enabled: true
    grant:
      read:
        - "**"
      outbox.read:
        - failed
      question.ask: true
      outbox.recover: true
      quarantine.read: true
      quarantine.recover: true
      run.read:
        - running
      run.recover: true
    processors:
      dome.health.report-card:
        grant:
          read:
            - "wiki/dailies/*.md"
            - "meta/report-card.md"
            - "meta/retrieval-misses.md"
            - ".dome/config.yaml"
          patch.auto:
            - "meta/report-card.md"
            - "wiki/dailies/*.md"
          run.read: true
          questions.read: true
          proposals.read: true
      dome.health.trust-review:
        grant:
          read:
            - ".dome/config.yaml"
          patch.propose:
            - ".dome/config.yaml"
          proposals.read: true
          run.read: true

engine:
  max_iterations: 100
  auto_commit_workflows: true

git:
  auto_commit_workflows: true
