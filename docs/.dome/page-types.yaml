# Dome vault page-types configuration
#
# Declares which page types are allowed under wiki/<type>/.
# Processors enforce page-type schema diagnostics against this list.
#
# Defaults are the four shipped types Dome ships with.
# Extensions are vault-specific types this project adds. Each extension may
# declare frontmatter_extras to teach `dome doctor` which optional fields are
# allowed on top of the universal frontmatter (type/created/updated/sources).
# Per docs/wiki/specs/page-schema.md §"Extension types".

defaults:
  - entity      # people, organizations, projects, products, protocols
  - concept     # ideas, patterns, principles, technical topics
  - source      # summaries of one ingested raw source
  - synthesis   # cross-cutting analysis, comparisons, design memos

extensions:
  - name: spec  # this project's authoritative specs (Dome SDK architecture)
    frontmatter_extras:
      status: draft | review | normative
  - name: invariant  # named invariants the engine and processors enforce
    frontmatter_extras:
      tier: axiom | shipped-default | opt-in | deferred
      severity: required | recommended
      coverage: off-matrix | matrix | deferred
      # enforced_by is the canonical coverage field per
      # wiki/specs/sdk-surface.md — a list of repo-relative test files,
      # verified by tests/integration/invariant-coverage.test.ts.
      enforced_by: <list of test paths>
      enforced_at: <path>
      enforced_at_status: shipped | implemented | partial | deferred
  - name: matrix  # behavior matrices (tool × invariant, intent × prompt, event × payload)
    frontmatter_extras: {}
  - name: linter  # structural lint rules encoded as substrate pages
    frontmatter_extras:
      status: v1 | v1.5 | v2 | proposed
      coverage: off-matrix | matrix | deferred
      enforced_at: <path>
      enforced_at_status: shipped | implemented | partial | deferred
  - name: gotcha  # design gotchas / scars / failure modes
    frontmatter_extras:
      coverage: off-matrix | matrix | deferred
      enforced_at: <path>
      enforced_at_status: shipped | implemented | partial | deferred
      first_observed: <date>
      severity: low | medium | high
