id: test.model-write-provenance
version: 0.1.0
processors:
  - id: test.model-write-provenance.emit
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: file.created
        pathPattern: inbox/raw/*.md
    capabilities:
      - kind: read
        paths: ["inbox/raw/**"]
      - kind: patch.auto
        paths: ["wiki/generated/**"]
      - kind: model.invoke
        modelAllowlist: ["test-model"]
    execution:
      class: llm
      timeoutMs: 1000
      modelCallTimeoutMs: 500
    module: processors/emit.ts
