id: test.questions-changed
version: 0.1.0
processors:
  - id: test.questions-changed.ask
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: file.created
        pathPattern: wiki/ask.md
    capabilities:
      - kind: read
        paths: ["wiki/ask.md"]
      - kind: question.ask
    module: processors/ask.ts
  - id: test.questions-changed.subscriber
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: questions.changed
    capabilities:
      - kind: question.ask
    module: processors/subscriber.ts
