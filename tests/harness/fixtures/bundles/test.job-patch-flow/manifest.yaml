id: test.job-patch-flow
version: 0.1.0
processors:
  - id: test.job-patch-flow.enqueue
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: file.created
        pathPattern: wiki/seed.md
    capabilities:
      - kind: job.enqueue
        processors: ["test.job-patch-flow.worker"]
    module: processors/enqueue.ts
  - id: test.job-patch-flow.worker
    version: 0.1.0
    phase: garden
    triggers:
      - kind: signal
        name: document.changed
    capabilities:
      - kind: patch.auto
        paths: ["wiki/**"]
    module: processors/worker.ts
