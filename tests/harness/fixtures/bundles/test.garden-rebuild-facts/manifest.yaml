id: test.garden-rebuild-facts
version: 0.1.0
processors:
  - id: test.garden-rebuild-facts.emit
    version: 0.1.0
    phase: garden
    execution:
      class: deterministic
    triggers:
      - kind: signal
        name: document.changed
        pathPattern: "wiki/*.md"
      - kind: signal
        name: file.created
        pathPattern: "wiki/*.md"
    capabilities:
      - kind: read
        paths: ["wiki/*.md"]
      - kind: graph.write
        namespaces: ["test.garden_rebuild.*"]
    module: processors/emit.ts
